name: 🎬 Actually Watch YouTube Video (6 Hours)

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  watch-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install

      - name: Create output directory
        run: mkdir -p ./output ./logs

      - name: 🎬 Watch YouTube Video for 6 Hours
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         🎬 STARTING 6-HOUR YOUTUBE WATCH SESSION           ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📺 Video URL: https://www.youtube.com/a85_ya0G2U6Aa8Y"
          echo "⏱️  Duration: 6 hours (360 minutes)"
          echo "🌐 Browser: Chromium (Headless)"
          echo "📅 Started: $(date)"
          echo ""

          node watch-actual.js

      - name: Generate Summary
        if: always()
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              ✅ WATCH SESSION COMPLETED                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 Results:"
          if [ -f ./output/report.txt ]; then
            cat ./output/report.txt
          fi
          echo ""
          echo "📁 Output files:"
          ls -lh ./output/ 2>/dev/null || echo "No output files"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-session-data
          path: ./output/
          retention-days: 90

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-session-logs
          path: ./logs/
          retention-days: 90

      - name: Create Summary Report
        if: always()
        run: |
          cat > WATCH_SUMMARY.md << 'EOF'
          # 📺 YouTube Watch Session Summary

          ## ✅ Mission Accomplished!

          ### Timeline:
          - Start: See workflow logs for exact time
          - Duration: 6 hours
          - End: Automatically after 6 hours
          EOF

          cat WATCH_SUMMARY.md

      - name: Commit Results (Optional)
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add WATCH_SUMMARY.md || true
          git commit -m "Update watch summary" || true
          git push || true
